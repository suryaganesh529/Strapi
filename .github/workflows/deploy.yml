name: Strapi Build and Deploy
on:
    push:
        branches:
        - main
jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Set up Node.js
          uses: actions/setup-node@v6
          with:
            node-version: 20.x

        - name: Install dependencies
          run: npm install

        - name: Build Strapi
          run: npm run build

        - name: Deploy to Azure Web App
          uses: azure/webapps-deploy@v2
          with:
            app-name: 'strapi-azure-app' # Replace with your Azure Web App name
            publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}