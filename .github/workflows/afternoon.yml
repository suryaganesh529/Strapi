name: Strapi Build and Deploy

on:
  workflow_dispatch:
    # Optional: another branch for backup deployments

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Strapi
        run: npm run build

      - name: Zip artifact
        run: |
          zip -r app.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name teststrapi \
            --resource-group teststrapi_group \
            --src-path app.zip \
            --type zip \
            --async true \
            --timeout 1000
