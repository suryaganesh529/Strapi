name: Strapi Build and Deploy

on:
    push:
        branches:
            - main # Change to your deployment branch....
            - morning-backup # Optional: another branch for backup deployments

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build Strapi
              run: npm run build

            - name: Zip artifact
              run: |
                  zip -r app.zip . \
                    -x ".git/*" \
                    -x ".github/*" \
                    -x "*.tar.gz" \
                    -x "*.zip"
                  echo "Zip size: $(du -sh app.zip | cut -f1)"

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Deploy to Azure Web App
              run: |
                  az webapp deploy \
                      --name teststrapi \
                      --resource-group teststrapi_group \
                      --src-path app.zip \
                      --type zip \
                      --async true 2>&1 | grep -A 20 "Starting the site" | head -20

            - name: Verify App is Running
              run: |
                  STATUS=$(az webapp show \
                    --name teststrapi \
                    --resource-group teststrapi_group \
                    --query "state" \
                    --output tsv)
                  echo "App state: $STATUS"
                  if [ "$STATUS" != "Running" ]; then
                    echo "❌ App is not running!"
                    exit 1
                  fi
                  echo "✅ App is running successfully!"

            - name: Verify App is Responding
              run: |
                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                    https://teststrapi-awcndzhaaxadabaw.centralindia-01.azurewebsites.net)
                  echo "HTTP Status: $HTTP_STATUS"
                  if [ "$HTTP_STATUS" != "200" ]; then
                    echo "❌ App is not responding!"
                    exit 1
                  fi
                  echo "✅ Deployment verified successfully!"
